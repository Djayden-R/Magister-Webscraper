name: "Magister Exporter"
version: "0.0.26"
slug: magister_exporter
arch:
  - aarch64
  - amd64
description: "Magister Exporter fetches Magister tokens and uses those to fetch the calendars, these will be hosted on port 15060"
options:
  credentials: []
  days_to_fetch: 14
  refresh_time: 5
schema:
  credentials:
    - name: str
      username: str
      password: str
      uuid: str
  days_to_fetch: int
  refresh_time: int
ports:
  15060/tcp: 15060